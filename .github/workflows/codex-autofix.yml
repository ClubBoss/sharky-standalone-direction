name: codex-autofix

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  trigger:
    # только когда ревью оставил Codex-бот
    if: |
      (github.event_name == 'pull_request_review' &&
       github.event.review.user.login == 'chatgpt-codex-connector[bot]') ||
      (github.event_name == 'pull_request_review_comment' &&
       github.event.comment.user.login == 'chatgpt-codex-connector[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Post @codex fix comments
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request || context.payload.review.pull_request_url && (await github.request(context.payload.review.pull_request_url)).data;
            const issue_number = pr.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: '@codex fix comments'
            });
