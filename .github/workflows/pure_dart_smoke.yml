# PR trigger removed; mono-ci is the single PR gate.
name: pure-dart-smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || contains(join(github.event.pull_request.labels.*.name), 'run-content-ci') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: subosito/flutter-action@v2
        with:
          sdk: stable

      - name: Cache Pub and .dart_tool
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-dart-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-dart-

      - name: JSONL guard (drills)
        if: ${{ hashFiles('tools/jsonl_guard.py') != '' }}
        run: python3 tools/jsonl_guard.py --check 'content/*/*/drills.jsonl'

      - name: Allowlists check
        run: |
          set -euo pipefail
          BASE=origin/main
          git fetch --no-tags --prune --depth=1 origin main
          CHANGED=$(git diff --name-only "$BASE...HEAD")
          if echo "$CHANGED" | grep -Eq '^(content/|assets/|theory/|packs/|training_packs/|tooling/allowlists/|tooling/pre_release_check\.dart|tools/health_dashboard\.dart)'; then
            if [ -f tools/allowlists_sync.py ]; then
              python3 tools/allowlists_sync.py --check || true
            else
              echo "SKIP: tools/allowlists_sync.py not present"
            fi
          else
            echo "SKIP: no relevant diff for allowlists"
          fi

      - name: Run pure Dart smoke tests
        run: |
          for test_path in \
            test/canonical_guard_test.dart \
            test/guard_single_site_test.dart \
            test/actions_subtitle_smoke_test.dart \
            test/spot_maps_coverage_test.dart \
            test/spotkind_enum_discipline_test.dart \
            test/kpi_gate_test.dart \
            test/weakness_log_test.dart \
            test/kpi_fields_test.dart; do
            if [ -f "$test_path" ]; then
              dart test "$test_path" -r expanded
            else
              echo "SKIP: $test_path not present"
            fi
          done

      - name: Analyze changed Dart files
        run: |
          git fetch --depth=1 origin main || true
          CHANGED=$(git diff --name-only origin/main... | grep -E '\.dart$' || true)
          if [ -n "$CHANGED" ]; then
            dart analyze $CHANGED
          else
            echo "No changed Dart files to analyze."
          fi

      - name: SpotKind Guard
        run: |
          if [ -f tool/ci_guard.dart ]; then
            dart run tool/ci_guard.dart
          else
            echo "SKIP: tool/ci_guard.dart not present"
          fi
