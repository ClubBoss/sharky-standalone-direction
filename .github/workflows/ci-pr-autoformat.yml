name: Codex PR Autoformat (manual check)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codex-autoformat-${{ github.sha }}
  cancel-in-progress: true

jobs:
  autoformat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.35.0'
          cache: true

      - name: Pub get
        run: |
          if [ -f pubspec.yaml ]; then flutter pub get; fi

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze (informational)
        run: flutter analyze
        continue-on-error: true
